name: FacesDebug

options:
  minimumXcodeVersion: "15.0"
  deploymentTarget:
    iOS: "16.0"

packages:
  AppReveal:
    path: ../../../.packages/AppReveal/iOS

targets:
  FacesDebug:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: FacesDebug
    dependencies:
      - package: AppReveal
        product: AppReveal
    settings:
      base:
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: FacesDebug/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: ai.unlikeother.facesdebug
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ENABLE_BITCODE: "NO"
        CLANG_ENABLE_MODULES: "YES"
